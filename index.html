<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Founders Court</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root{ --ink:#14361f; --indigo:#2e6b3e; --indigoD:#1f4d2c; --amber:#7b8b3a; --lime:#d9e86a;
    --s50:#faf7ef;--s100:#f3eee0;--s200:#e6dfc9;--s300:#d4cbab;--s400:#9a9477;

  .champ{ margin-top:12px; border-radius:16px; background:var(--indigoD); color:#fff; padding:16px; position:relative; overflow:hidden; }

  .fe{ display:flex; align-items:flex-end; justify-content:space-between; margin-top:4px; }

  .rank.g1{ background:#facc15; color:#713f12; } .rank.g2{ background:var(--s300); color:var(--s700); } .rank.g3{ background:#b45309; color:#fff; }
  .mood{ font-size:20px; line-height:1; flex:none; }
  .nm{ flex:1; min-width:0; } .nm .n{ font-weight:600; color:var(--s900); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .nm .s{ font-size:11px; color:var(--s400); margin-top:1px; }
  .val{ text-align:right; line-height:1; } .val .v{ font-size:20px; font-weight:800; color:var(--indigo); } .val .u{ font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--s400); }
  .note{ margin-top:16px; text-align:center; font-size:11px; color:var(--s400); }

  .score{ display:flex; align-items:center; gap:6px; justify-content:center; } .sc{ font-size:24px; font-weight:800; color:var(--s400); } .sc.win{ color:var(--indigo); } .dash{ color:var(--s300); font-size:14px; }
  .act{ display:flex; align-items:center; gap:10px; border-radius:16px; border:1px solid var(--s200); background:#fff; padding:10px 12px; }

  .member .pn{ flex:1; font-weight:500; color:var(--s800); } .ghost{ font-size:12px; font-weight:500; color:var(--s400); }
  .removed{ display:flex; align-items:center; gap:12px; border-radius:16px; border:1px dashed var(--s200); background:var(--s50); padding:8px 12px; color:var(--s400); }
  .removed .pn{ flex:1; font-size:14px; text-decoration:line-through; } .restore{ font-size:12px; font-weight:500; color:var(--indigo); }
  .empty{ margin-top:40px; display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 24px; }
  .empty .ec{ width:56px; height:56px; border-radius:50%; background:var(--ind50); display:flex; align-items:center; justify-content:center; font-size:24px; }
  .empty h3{ margin-top:12px; font-size:16px; font-weight:700; color:var(--s800); } .empty p{ margin-top:4px; font-size:14px; color:var(--s500); }
  .empty .cta{ margin-top:16px; border-radius:12px; background:var(--indigo); padding:8px 16px; font-size:14px; font-weight:600; color:#fff; }
  .arep{ display:flex; align-items:center; gap:8px; } .arep span.l{ font-size:13px; font-weight:600; color:var(--s500); }
  .arep select{ margin-left:auto; border-radius:10px; border:1px solid var(--s200); background:#fff; padding:6px 10px; font-size:13px; outline:none; }
  .acard{ display:flex; gap:10px; border-radius:16px; border:1px solid var(--s200); background:#fff; padding:12px; }
  .acard .ai{ font-size:20px; line-height:1.1; flex:none; } .acard .at{ font-size:13px; font-weight:700; color:var(--s800); } .acard .ab{ margin-top:2px; font-size:13px; color:var(--s500); line-height:1.45; }
  nav{ position:sticky; bottom:0; z-index:20; max-width:480px; margin:0 auto; width:100%; border-top:1px solid var(--s200); background:rgba(255,255,255,.96); backdrop-filter:blur(8px); padding:8px; display:flex; align-items:center; justify-content:space-around; }
  .navbtn{ display:flex; flex:1; flex-direction:column; align-items:center; gap:2px; padding:4px 0; font-size:10px; font-weight:500; color:var(--s400); }
  .navbtn .ni{ font-size:18px; line-height:1; } .navbtn.on{ color:var(--indigo); }
  .fab{ margin-top:-28px; width:56px; height:56px; border-radius:50%; background:var(--indigo); color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:0 8px 16px rgba(0,0,0,.15); }
  .fab:disabled{ background:var(--s200); color:var(--s400); box-shadow:none; }
  .histwrap{ position:sticky; bottom:68px; z-index:10; max-width:480px; margin:0 auto; width:100%; display:flex; justify-content:center; gap:8px; pointer-events:none; }
  .histwrap .pill{ pointer-events:auto; display:inline-flex; align-items:center; gap:6px; box-shadow:0 1px 2px rgba(0,0,0,.05); margin-bottom:4px; }
  .overlay{ position:fixed; inset:0; z-index:50; display:flex; align-items:flex-end; justify-content:center; background:rgba(15,23,42,.45); }
  .sheet{ width:100%; max-width:480px; border-top-left-radius:24px; border-top-right-radius:24px; background:#fff; padding:20px; max-height:92vh; overflow-y:auto; }
  .grab{ margin:0 auto 12px; width:40px; height:4px; border-radius:999px; background:var(--s200); }
  .shead{ display:flex; align-items:center; justify-content:space-between; } .shead h2{ font-size:18px; font-weight:800; } .closeb{ color:var(--s400); font-size:20px; padding:4px; }
  .recbtn{ width:100%; margin-top:12px; border-radius:16px; border:1px solid var(--s200); background:#fff; padding:16px; display:flex; align-items:center; gap:12px; text-align:left; }
  .recbtn:disabled{ opacity:.5; } .recbtn .ri{ font-size:24px; } .recbtn .rt{ font-size:15px; font-weight:700; color:var(--s900); } .recbtn .rd{ font-size:12px; color:var(--s500); margin-top:1px; }
  .two{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .tbox{ border-radius:16px; border:1px solid; padding:12px; } .tbox.a{ border-color:#c7d2fe; background:#eef2ff; } .tbox.b{ border-color:#fde68a; background:#fffbeb; }
  .tbox .lab{ display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--s500); margin-bottom:8px; }
  .tbox .dot{ width:8px; height:8px; border-radius:50%; } .tbox.a .dot{ background:var(--indigo); } .tbox.b .dot{ background:var(--amber); }
  .tbox.b{ border-color:#cdd89a; background:#f6f7e8; }
  select.psel{ width:100%; border-radius:8px; border:1px solid var(--s200); background:#fff; padding:8px 10px; font-size:14px; outline:none; } .gap{ height:8px; }
  .stepbox{ border-radius:16px; border:1px solid var(--s200); padding:12px; } .stepbox .lab{ text-align:center; font-size:12px; font-weight:500; color:var(--s500); margin-bottom:8px; }
  .stepper{ display:flex; align-items:center; justify-content:space-between; } .stepbtn{ width:36px; height:36px; border-radius:8px; background:var(--s100); color:var(--s700); font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .stepval{ width:48px; text-align:center; font-size:24px; font-weight:800; color:var(--indigo); }
  .fld{ margin-top:16px; } .fld .fl{ font-size:12px; font-weight:600; color:var(--s500); margin-bottom:6px; }
  .typegrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .typebtn{ border-radius:12px; border:1px solid var(--s200); background:#fff; padding:10px; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--s700); text-align:left; }
  .typebtn.on{ border-color:var(--indigo); background:var(--ind50); color:var(--indigo); }
  .typebtn .te{ font-size:18px; }
  .txtin{ width:100%; border-radius:10px; border:1px solid var(--s200); background:#fff; padding:10px 12px; font-size:14px; outline:none; }
  .txtin:focus{ border-color:var(--indigo); }
  .datebox{ margin-top:16px; display:flex; align-items:center; gap:8px; border-radius:12px; border:1px solid var(--s200); padding:10px 12px; }
  .datebox .dl{ font-size:14px; color:var(--s500); } .datebox input{ margin-left:auto; border:none; outline:none; font-size:14px; color:var(--s700); background:transparent; }
  .warn{ margin-top:8px; text-align:center; font-size:12px; color:#ef4444; }
  .save{ margin-top:16px; width:100%; border-radius:12px; background:var(--indigo); padding:12px; font-size:14px; font-weight:600; color:#fff; } .save:disabled{ background:var(--s200); color:var(--s400); }
</style>

<body>
<div id="app" class="wrap"></div>
<script>
(function(){
  /* ===== Supabase config — PASTE YOUR TWO VALUES BELOW ===== */
  var SB_URL = "https://qzhkketdthubdiwfbmiv.supabase.co";   /* base project URL (no /rest/v1/) */
  var SB_KEY = "sb_publishable_Mqbveuux8M5549qBrpx4Ow_u3p9ozHe";
  /* ========================================================= */
  var ROW = SB_URL + "/rest/v1/scores_state?id=eq.main";
  var H = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" };

  function loadState(){
    return fetch(ROW + "&select=data", { headers: H }).then(function(r){ if(!r.ok) throw new Error("load "+r.status); return r.json(); })
      .then(function(rows){ var d=(rows&&rows[0]&&rows[0].data)?rows[0].data:{}; return {
        members:Array.isArray(d.members)?d.members:[], games:Array.isArray(d.games)?d.games:[], activities:Array.isArray(d.activities)?d.activities:[],
        backups:Array.isArray(d.backups)?d.backups:[] }; });
  }
  function saveState(st){
    return fetch(ROW, { method:"PATCH", headers:Object.assign({},H,{Prefer:"return=minimal"}),
      body:JSON.stringify({ data:{members:st.members,games:st.games,activities:st.activities,backups:st.backups||backups}, updated_at:new Date().toISOString() }) })
      .then(function(r){ if(!r.ok) throw new Error("save "+r.status); });
  }
  /* keep up to 14 daily auto-snapshots inside the DB as a safety net */
  function autoSnapshot(){
    try{
      var today=todayISO();
      backups=(backups||[]).filter(function(b){return b.date!==today;});
      backups.push({ date:today, members:state.members, games:state.games, activities:state.activities });
      if(backups.length>14) backups=backups.slice(backups.length-14);
    }catch(e){}
  }

  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var WEEKDAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var BIZ=[
    {k:"biz_given",label:"Business given",icon:"💸",withReq:true,money:true},
    {k:"biz_received",label:"Business received",icon:"💰",withReq:true,money:true},
    {k:"referral_given",label:"Referral given",icon:"🔗",withReq:true},
    {k:"referral_received",label:"Referral received",icon:"📥",withReq:true},
    {k:"deal",label:"Deal closed",icon:"🤝",withReq:false},
    {k:"coffee",label:"Coffee / 1:1",icon:"☕",withReq:true},
    {k:"guest",label:"Guest brought",icon:"🙌",withReq:false},
    {k:"attendance",label:"Attended",icon:"✅",withReq:false}
  ];
  function bizDef(k){ return BIZ.find(function(x){return x.k===k;})||{label:k,icon:"•",withReq:false}; }
  function rupee(n){ n=Number(n)||0; return "₹"+n.toLocaleString("en-IN"); }

  var now=new Date();
  var state={ members:[], games:[], activities:[], tab:"board", board:"court", boardMode:"points",
    view:{year:now.getFullYear(),month:now.getMonth(),allTime:false},
    showRecord:false, showGame:false, showBiz:false, gameDraft:null, bizDraft:null,
    showRemoved:false, confirmDel:null, _adate:null, sync:"loading", showBackup:false };
  var savingFlight=false, pendingSave=null, backups=[], loadedOk=false;

  function uid(){ return "id-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8); }
  function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function fmtDate(iso){ var p=iso.split("-").map(Number); return MONTHS[p[1]-1].slice(0,3)+" "+p[2]+", "+p[0]; }
  function fullDate(iso){ var p=iso.split("-").map(Number); var d=new Date(p[0],p[1]-1,p[2]); return WEEKDAYS[d.getDay()]+", "+MONTHS[p[1]-1].slice(0,3)+" "+p[2]; }
  function nameOf(id){ var p=state.members.find(function(x){return x.id===id;}); return p?p.name:"Unknown"; }
  function activeMembers(){ return state.members.filter(function(p){return p.active!==false;}); }
  function removedMembers(){ return state.members.filter(function(p){return p.active===false;}); }
  function inView(date){ if(state.view.allTime) return true; var p=date.split("-").map(Number); return p[0]===state.view.year&&(p[1]-1)===state.view.month; }
  function monthGames(){ return state.games.filter(function(g){return inView(g.date);}); }
  function monthActs(){ return state.activities.filter(function(a){return inView(a.date);}); }

  function commit(){ autoSnapshot(); render(); pushSave({members:state.members,games:state.games,activities:state.activities,backups:backups}); }
  function pushSave(snap){ if(savingFlight){ pendingSave=snap; return; } savingFlight=true; setSync("saving");
    saveState(snap).then(function(){setSync("synced");}).catch(function(){setSync("offline");})
      .then(function(){ savingFlight=false; if(pendingSave){ var p=pendingSave; pendingSave=null; pushSave(p); } }); }
  function setSync(s){ state.sync=s; if(document.getElementById("syncDot")) updateSync(); }

  /* court standings */
  function statsFor(gs){ var m={}; function e(id){ if(!m[id]) m[id]={id:id,pf:0,pa:0,g:0,w:0,l:0}; return m[id]; }
    gs.forEach(function(g){ var a=+g.s1,b=+g.s2;
      g.t1.forEach(function(id){var r=e(id);r.pf+=a;r.pa+=b;r.g++;if(a>b)r.w++;else if(a<b)r.l++;});
      g.t2.forEach(function(id){var r=e(id);r.pf+=b;r.pa+=a;r.g++;if(b>a)r.w++;else if(b<a)r.l++;}); });
    return Object.keys(m).map(function(k){var r=m[k];r.name=nameOf(r.id);r.diff=r.pf-r.pa;return r;}); }
  function rankCourt(gs,mode){ var arr=statsFor(gs); arr.sort(function(x,y){ return mode==="wins"
      ?(y.w-x.w)||(y.diff-x.diff)||(y.pf-x.pf)||x.name.localeCompare(y.name):(y.pf-x.pf)||(y.diff-x.diff)||(y.w-x.w)||x.name.localeCompare(y.name); }); return arr; }
  function trailing(gs,target){ var ord=gs.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;}); var seq={};
    ord.forEach(function(g){ var a=+g.s1,b=+g.s2,aw=a>b,bw=b>a;
      g.t1.forEach(function(id){(seq[id]=seq[id]||[]).push(aw?"W":bw?"L":"T");});
      g.t2.forEach(function(id){(seq[id]=seq[id]||[]).push(bw?"W":aw?"L":"T");}); });
    return Object.keys(seq).map(function(id){var arr=seq[id],s=0;for(var i=arr.length-1;i>=0;i--){if(arr[i]===target)s++;else break;}return {id:id,name:nameOf(id),streak:s};}); }
  function moodEmoji(rank,total){ if(total<2)return "🎾"; if(rank===1)return "😎"; if(rank===total)return "😠"; if(rank===2)return "😄"; if(rank===3)return "🙂"; if(rank>total-2)return "😕"; return "😐"; }

  /* business standings — points reward GIVERS; received money is tracked but not ranked */
  var ZERO_POINT={ referral_received:1, biz_received:1 }; // these types earn 0 ranking points
  function bizStats(acts){ var m={};
    function e(id){ if(!m[id]) m[id]={id:id,total:0,counts:{},given:0,received:0}; return m[id]; }
    acts.forEach(function(a){ var r=e(a.memberId);
      r.counts[a.type]=(r.counts[a.type]||0)+1;
      if(!ZERO_POINT[a.type]) r.total++;            // ranking points: givers only
      if(a.type==="biz_given") r.given+=Number(a.amount)||0;
      if(a.type==="biz_received") r.received+=Number(a.amount)||0;
    });
    return Object.keys(m).map(function(k){var r=m[k];r.name=nameOf(r.id);return r;}); }
  function rankBiz(acts){ var arr=bizStats(acts); arr.sort(function(x,y){ return (y.given-x.given)||(y.total-x.total)||(y.received-x.received)||x.name.localeCompare(y.name); }); return arr; }
  function bizBreakdown(counts){ return BIZ.filter(function(d){return counts[d.k];}).map(function(d){return d.icon+counts[d.k];}).join("  "); }

  /* ===== Analyst ===== */
  function generateReport(date){
    var dG=state.games.filter(function(g){return g.date===date;});
    var dA=state.activities.filter(function(a){return a.date===date;});
    var court=rankCourt(dG,"wins"); var biz=rankBiz(dA);
    var cards=[]; var headline=dG.length+" game"+(dG.length===1?"":"s")+" · "+dA.length+" business activit"+(dA.length===1?"y":"ies")+" logged";
    if(court.length){ var m=court[0]; cards.push({i:"🎾",t:"Court MVP",b:m.name+" led the pickleball with "+m.w+"W "+m.l+"L and "+m.pf+" points."}); }
    if(dG.length){ var big=dG[0]; dG.forEach(function(g){ if(Math.abs((+g.s1)-(+g.s2))>Math.abs((+big.s1)-(+big.s2)))big=g; });
      var a=+big.s1,b=+big.s2,wT=a>=b?big.t1:big.t2,lT=a>=b?big.t2:big.t1,bm=Math.abs(a-b);
      cards.push({i:"💥",t:"Biggest Win",b: bm===0?"Closest of margins — every game stayed tight.":(wT.map(nameOf).join(" & ")+" beat "+lT.map(nameOf).join(" & ")+" "+Math.max(a,b)+"–"+Math.min(a,b)+".")}); }
    var hot=trailing(state.games,"W").filter(function(s){return s.streak>=2;}).sort(function(a,b){return b.streak-a.streak;});
    if(hot.length) cards.push({i:"🔥",t:"Hot Hand",b:hot[0].name+" is on a "+hot[0].streak+"-game win streak."});
    if(dA.length){
      var givenTotal=dA.filter(function(a){return a.type==="biz_given";}).reduce(function(s,a){return s+(Number(a.amount)||0);},0);
      var c=biz[0]; cards.push({i:"🏆",t:"Top Giver",b:c.name+" gave the most business — "+rupee(c.given)+" sent to fellow members"+(c.received?(", and received "+rupee(c.received)):"")+"."});
      if(givenTotal) cards.push({i:"💸",t:"Business Circulated",b:rupee(givenTotal)+" of business was passed around the room today. That is the engine of renewals."});
      var deals=dA.filter(function(a){return a.type==="deal";});
      if(deals.length) cards.push({i:"🤝",t:"Deals Closed",b:deals.length+" deal"+(deals.length===1?"":"s")+" transacted — by "+deals.map(function(a){return nameOf(a.memberId);}).join(", ")+"."});
      var refs=dA.filter(function(a){return a.type==="referral_given";}).length;
      if(refs) cards.push({i:"🔗",t:"Referrals Given",b:refs+" referral"+(refs===1?"":"s")+" passed to other members."});
      var coffees=dA.filter(function(a){return a.type==="coffee";}).length/2;
      if(coffees>=1) cards.push({i:"☕",t:"Coffees",b:Math.round(coffees)+" one-on-one"+(Math.round(coffees)===1?"":"s")+" logged — relationships deepening off the court."});
      var att=dA.filter(function(a){return a.type==="attendance";}).length;
      var guests=dA.filter(function(a){return a.type==="guest";}).length;
      if(att||guests) cards.push({i:"🙌",t:"Turnout",b:(att?att+" member"+(att===1?"":"s")+" checked in":"")+(att&&guests?", ":"")+(guests?guests+" guest"+(guests===1?"":"s")+" brought along":"")+"."});
    }
    var allBiz=rankBiz(state.activities);
    if(allBiz.length){ var Lb=allBiz[0]; cards.push({i:"🏅",t:"Standings Watch",b:Lb.name+" leads the all-time board with "+rupee(Lb.given)+" given. Generosity wins here."}); }
    cards.push({i:"🎤",t:"Host's Note",b:"Play hard, connect harder. The court warms people up — the referrals are where the magic happens."});
    return {date:date,headline:headline,cards:cards};
  }

  function bizSheet(am){
    var d=state.bizDraft; var def=bizDef(d.type); var needAmt=!!def.money; var complete=d.type&&d.memberId&&(!needAmt||(Number(d.amount)>0));
    function opts(sv,skip){ var o='<option value="">Member</option>'; am.forEach(function(p){ if(skip&&p.id===skip)return; o+='<option value="'+p.id+'" '+(sv===p.id?'selected':'')+'>'+esc(p.name)+'</option>'; }); return o; }

    var amtFld = needAmt ? '<div class="fld"><div class="fl">Amount (₹)</div><input class="txtin" id="bizAmt" type="number" inputmode="numeric" min="0" placeholder="e.g. 50000" value="'+(d.amount||"")+'" data-act="bizamt" /></div>' : '';
    var withLabel = (d.type==="biz_given")?"To which member":(d.type==="biz_received")?"From which member":"With (optional)";
    var withFld = def.withReq ? '<div class="fld"><div class="fl">'+withLabel+'</div><select class="psel" data-act="bizpick" data-slot="withId">'+opts(d.withId,d.memberId)+'</select></div>' : '';
    var creditNote = (d.type==="biz_given")?'<div class="note" style="text-align:left;margin-top:8px">This counts toward the giver\u2019s ranking. The receiver\u2019s \u201cbusiness received\u201d is recorded automatically.</div>'
      : (d.type==="referral_given")?'<div class="note" style="text-align:left;margin-top:8px">Only the giver earns the point. The receiver is recorded but scores 0.</div>' : '';
    return '<div class="overlay" data-act="bg"><div class="sheet"><div class="grab"></div>'+
      '<div class="shead"><h2>💼 Log activity</h2><button class="closeb" data-act="closeall">&times;</button></div>'+
      '<div class="fld"><div class="fl">Activity</div><div class="typegrid">'+types+'</div></div>'+
      '<div class="fld"><div class="fl">Member (credited)</div><select class="psel" data-act="bizpick" data-slot="memberId">'+opts(d.memberId,d.withId)+'</select></div>'+
      amtFld+withFld+creditNote+
      '<div class="fld"><div class="fl">Note (optional)</div><input class="txtin" id="bizNote" placeholder="e.g. interior design project" value="'+esc(d.note||"")+'" data-act="biznote" /></div>'+
      '<div class="datebox"><span class="dl">📅 Date</span><input type="date" value="'+d.date+'" data-act="bizdate" /></div>'+
      '<button class="save" data-act="savebiz" '+(complete?'':'disabled')+'>Log activity</button></div></div>';
  }

  /* ===== Events ===== */
  function wire(){
    document.querySelectorAll("[data-act]").forEach(function(el){
      var act=el.getAttribute("data-act");
      if(act==="gpick"||act==="bizpick"){ el.addEventListener("change",function(e){ var slot=e.target.getAttribute("data-slot"); (act==="gpick"?state.gameDraft:state.bizDraft)[slot]=e.target.value; render(); }); return; }
      if(act==="gdate"){ el.addEventListener("change",function(e){ state.gameDraft.date=e.target.value; }); return; }
      if(act==="bizdate"){ el.addEventListener("change",function(e){ state.bizDraft.date=e.target.value; }); return; }
      if(act==="biznote"){ el.addEventListener("input",function(e){ state.bizDraft.note=e.target.value; }); return; }
      if(act==="bizamt"){ el.addEventListener("input",function(e){ state.bizDraft.amount=e.target.value; }); return; }
      if(act==="adate"){ el.addEventListener("change",function(e){ state._adate=e.target.value; render(); }); return; }
      if(act==="importfile"){ el.addEventListener("change",onImportFile); return; }
      el.addEventListener("click",onClick);
    });
    var nm=document.getElementById("newMember"); if(nm){ nm.addEventListener("keydown",function(e){ if(e.key==="Enter") addMember(); }); }
    var imp=document.getElementById("importFile"); if(imp){ imp.addEventListener("change",onImportFile); }
  }
  function closeAll(){ state.showRecord=false; state.showGame=false; state.showBiz=false; state.gameDraft=null; state.bizDraft=null; render(); }
  function onClick(e){ var el=e.currentTarget, a=el.getAttribute("data-act");
    if(a==="tab"){ state.tab=el.getAttribute("data-tab"); state.confirmDel=null; render(); }
    else if(a==="ttab"){ var t=el.getAttribute("data-t"); state.tab=(state.tab===t?"board":t); state.confirmDel=null; render(); }
    else if(a==="board"){ state.board=el.getAttribute("data-b"); render(); }
    else if(a==="mode"){ state.boardMode=el.getAttribute("data-mode"); render(); }
    else if(a==="month"){ stepMonth(+el.getAttribute("data-dir")); }
    else if(a==="alltime"){ state.view.allTime=!state.view.allTime; render(); }
    else if(a==="openrecord"){ if(activeMembers().length>=1){ state.showRecord=true; render(); } }
    else if(a==="newgame"){ if(activeMembers().length<4)return; state.showRecord=false; state.showGame=true; state.gameDraft={t1a:"",t1b:"",t2a:"",t2b:"",s1:0,s2:0,date:todayISO()}; render(); }
    else if(a==="newbiz"){ state.showRecord=false; state.showBiz=true; state.bizDraft={type:"biz_given",memberId:"",withId:"",amount:"",note:"",date:todayISO()}; render(); }
    else if(a==="bg"){ if(e.target===e.currentTarget) closeAll(); }
    else if(a==="closeall"){ closeAll(); }
    else if(a==="step"){ var k=el.getAttribute("data-key"); state.gameDraft[k]=Math.max(0,(+state.gameDraft[k])+(+el.getAttribute("data-d"))); render(); }
    else if(a==="biztype"){ state.bizDraft.type=el.getAttribute("data-type"); render(); }
    else if(a==="savegame"){ saveGame(); }
    else if(a==="savebiz"){ saveBiz(); }
    else if(a==="addmember"){ addMember(); }
    else if(a==="removemember"){ setActive(el.getAttribute("data-id"),false); }
    else if(a==="restoremember"){ setActive(el.getAttribute("data-id"),true); }
    else if(a==="deletemember"){ state.members=state.members.filter(function(p){return p.id!==el.getAttribute("data-id");}); commit(); }
    else if(a==="togglerem"){ state.showRemoved=!state.showRemoved; render(); }
    else if(a==="askdel"){ state.confirmDel=el.getAttribute("data-id"); render(); }
    else if(a==="cancel"){ state.confirmDel=null; render(); }
    else if(a==="delgame"){ state.games=state.games.filter(function(g){return g.id!==el.getAttribute("data-id");}); state.confirmDel=null; commit(); }
    else if(a==="openbackup"){ state.showBackup=true; render(); }
    else if(a==="closeback"){ state.showBackup=false; render(); }
    else if(a==="export"){ doExport(); }
    else if(a==="importbtn"){ var f=document.getElementById("importFile"); if(f) f.click(); }
    else if(a==="restoresnap"){ restoreSnap(el.getAttribute("data-date")); }
  }

  function doExport(){
    try{
      var payload={ app:"founders-court", exportedAt:new Date().toISOString(), members:state.members, games:state.games, activities:state.activities };
      var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      var url=URL.createObjectURL(blob); var a=document.createElement("a");
      a.href=url; a.download="founders-court-backup-"+todayISO()+".json"; document.body.appendChild(a); a.click();
      document.body.removeChild(a); setTimeout(function(){URL.revokeObjectURL(url);},1000);
    }catch(e){ alert("Export failed: "+e.message); }
  }
  function onImportFile(e){
    var file=e.target.files&&e.target.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(){ try{
      var d=JSON.parse(reader.result);
      if(!d||!Array.isArray(d.members)||!Array.isArray(d.activities)) throw new Error("not a valid backup file");
      if(!confirm("Replace ALL current data with this backup?\n("+d.members.length+" members, "+(d.games||[]).length+" games, "+d.activities.length+" activities)\n\nA snapshot of the current data is kept automatically.")) { e.target.value=""; return; }
      autoSnapshot();
      state.members=d.members; state.games=Array.isArray(d.games)?d.games:[]; state.activities=d.activities;
      state.showBackup=false; commit();
    }catch(err){ alert("Could not import: "+err.message); } e.target.value=""; };
    reader.readAsText(file);
  }
  function restoreSnap(date){
    var b=(backups||[]).find(function(x){return x.date===date;}); if(!b) return;
    if(!confirm("Restore the snapshot from "+fullDate(date)+"?\nThis replaces current data (a new snapshot of the current state is kept).")) return;
    autoSnapshot();
    state.members=b.members||[]; state.games=b.games||[]; state.activities=b.activities||[];
    state.showBackup=false; commit();
  }
  function stepMonth(dir){ if(state.view.allTime){ state.view.allTime=false; render(); return; } var m=state.view.month+dir,y=state.view.year; if(m<0){m=11;y--;} if(m>11){m=0;y++;} state.view.month=m; state.view.year=y; render(); }
  function saveGame(){ var d=state.gameDraft; var picks=[d.t1a,d.t1b,d.t2a,d.t2b].filter(Boolean); if(picks.length!==4||new Set(picks).size!==4)return;
    state.games.push({id:uid(),t1:[d.t1a,d.t1b],t2:[d.t2a,d.t2b],s1:+d.s1||0,s2:+d.s2||0,date:d.date}); closeAllNoRender(); state.tab="board"; state.board="court"; commit(); }
  function saveBiz(){ var d=state.bizDraft; if(!d.type||!d.memberId)return;
    var def=bizDef(d.type); var note=(d.note||"").trim()||null; var amt=def.money?(Number(d.amount)||0):undefined;
    if(def.money && !(amt>0)) return;
    if(def.money && d.withId){
      // One entry records both sides, linked. Giver ranks; receiver tracked at 0 points.
      var link=uid();
      if(d.type==="biz_given"){
        state.activities.push({id:uid(),link:link,type:"biz_given",memberId:d.memberId,withId:d.withId,amount:amt,note:note,date:d.date});
        state.activities.push({id:uid(),link:link,type:"biz_received",memberId:d.withId,withId:d.memberId,amount:amt,note:note,date:d.date});
      } else { // biz_received entered → also record the matching given for the other member
        state.activities.push({id:uid(),link:link,type:"biz_received",memberId:d.memberId,withId:d.withId,amount:amt,note:note,date:d.date});
        state.activities.push({id:uid(),link:link,type:"biz_given",memberId:d.withId,withId:d.memberId,amount:amt,note:note,date:d.date});
      }
    } else if((d.type==="referral_given"||d.type==="referral_received") && d.withId){
      // Record both directions; only the GIVER scores (received type earns 0 points)
      var link2=uid();
      if(d.type==="referral_given"){
        state.activities.push({id:uid(),link:link2,type:"referral_given",memberId:d.memberId,withId:d.withId,note:note,date:d.date});
        state.activities.push({id:uid(),link:link2,type:"referral_received",memberId:d.withId,withId:d.memberId,note:note,date:d.date});
      } else {
        state.activities.push({id:uid(),link:link2,type:"referral_received",memberId:d.memberId,withId:d.withId,note:note,date:d.date});
        state.activities.push({id:uid(),link:link2,type:"referral_given",memberId:d.withId,withId:d.memberId,note:note,date:d.date});
      }
    } else if(d.type==="coffee" && d.withId){
      var link3=uid();
      state.activities.push({id:uid(),link:link3,type:"coffee",memberId:d.memberId,withId:d.withId,note:note,date:d.date});
      state.activities.push({id:uid(),link:link3,type:"coffee",memberId:d.withId,withId:d.memberId,note:note,date:d.date});
    } else {
      var rec={id:uid(),type:d.type,memberId:d.memberId,withId:d.withId||null,note:note,date:d.date};
      if(def.money) rec.amount=amt;
      state.activities.push(rec);
    }
    closeAllNoRender(); state.tab="board"; state.board="business"; commit(); }
  function closeAllNoRender(){ state.showRecord=false; state.showGame=false; state.showBiz=false; state.gameDraft=null; state.bizDraft=null; }
  function addMember(){ var inp=document.getElementById("newMember"); if(!inp)return; var clean=inp.value.trim(); if(!clean)return;
    if(state.members.some(function(p){return p.active!==false&&p.name.toLowerCase()===clean.toLowerCase();})){ inp.value=""; return; }
    state.members.push({id:uid(),name:clean,active:true}); commit(); }
  function setActive(id,val){ var p=state.members.find(function(x){return x.id===id;}); if(p)p.active=val; commit(); }

  /* ===== Boot + live refresh ===== */
  function boot(){ loadState().then(function(s){ state.members=s.members; state.games=s.games; state.activities=s.activities; backups=s.backups||[]; loadedOk=true; state.sync="synced"; render(); })
    .catch(function(){ state.sync="offline"; render(); }); }
  setInterval(function(){ if(savingFlight||pendingSave||state.showRecord||state.showGame||state.showBiz||state.showBackup) return;
    loadState().then(function(s){ var ch=JSON.stringify([s.members,s.games,s.activities])!==JSON.stringify([state.members,state.games,state.activities]);
      state.members=s.members; state.games=s.games; state.activities=s.activities; backups=s.backups||backups; loadedOk=true; if(state.sync==="offline") state.sync="synced"; if(ch) render(); else updateSync();
    }).catch(function(){ state.sync="offline"; updateSync(); }); }, 5000);

  render(); boot();
})();
</script>
</body>
</html>
